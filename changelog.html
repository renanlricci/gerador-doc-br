<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gerador Doc BR — Changelog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">
  <header class="app-header">
    <img src="icon.svg" width="48" height="48" alt="">
    <div>
      <h1>Gerador Doc BR</h1>
      <span id="version" class="version"></span>
    </div>
  </header>

  <p class="dev"><span data-i18n="popupDevBy"></span> Renan Ricci</p>

  <section class="donate">
    <p class="donate-text" data-i18n="popupDonate"></p>
    <img class="qr" src="pix-qr.svg" alt="QR Code Pix">
    <button id="copy-pix" class="btn" data-i18n="popupCopyPix"></button>
  </section>

  <hr>

  <section>
    <h2 data-i18n="popupChangelog"></h2>
    <div id="changelog-entries"></div>
  </section>

  <script src="i18n.js"></script>
  <script src="donate.js"></script>
</body>
</html>
